# Physical ArduPlane/BlueOS fixed-wing stack.
#
# Reuses the shared BlueOS navigation core (MAVROS, OAK-1 MegaDepth,
# DemNav, WildNav, rosbridge) with airplane container names, topics, and
# scenario values supplied by systems/airplane/config/blueos.env; only the
# MAVROS mirror bridge service is airplane-specific.

include:
  - path: blueos_nav_core.yaml
    env_file: ../systems/airplane/config/blueos.env

services:
  airplane_bridge:
    image: cyberphysics/aerostack2:${CYBERPHYSICS_TAG:-arm64}
    container_name: airplane_bridge
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - mavros
    env_file:
      - ../systems/airplane/config/blueos.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/airplane:/workspace/systems/airplane:ro
      - /dev/shm:/dev/shm
    command: >
      mavros_mirror
        --ros-args
        --params-file /workspace/systems/airplane/config/mavros_bridge.yaml
        -p namespace:=${VEHICLE_NAMESPACE:-plane0}
