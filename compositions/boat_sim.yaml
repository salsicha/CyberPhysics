# Closed-loop BlueBoat simulation.

services:
  boat_sim:
    image: cyberphysics/boat:${CYBERPHYSICS_TAG:-latest}
    container_name: boat_sim
    network_mode: host
    ipc: host
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/boat/config:/workspace/config:ro
      - /dev/shm:/dev/shm
    command: >
      python3 /scripts/blueboat_sim.py
        --ros-args
        --params-file /workspace/config/simulation.yaml

  boat_bridge:
    image: cyberphysics/boat:${CYBERPHYSICS_TAG:-latest}
    container_name: boat_sim_bridge
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - boat_sim
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/boat/config:/workspace/config:ro
      - /dev/shm:/dev/shm
    command: >
      mavros_mirror
        --ros-args
        --params-file /workspace/config/bridge_sim.yaml

  harbor_waypoint_nav:
    image: cyberphysics/boat:${CYBERPHYSICS_TAG:-latest}
    container_name: boat_harbor_waypoint_nav
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - boat_bridge
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/boat/config:/workspace/config:ro
      - /dev/shm:/dev/shm
    command: >
      python3 /scripts/harbor_waypoint_nav.py
        --ros-args
        --params-file /workspace/config/harbor_survey.yaml

  boat_rosbridge:
    image: cyberphysics/boat:${CYBERPHYSICS_TAG:-latest}
    container_name: boat_sim_rosbridge
    network_mode: host
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    command: ros2 launch rosbridge_server rosbridge_websocket_launch.xml
