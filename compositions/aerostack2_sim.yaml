
services:
  simassets:
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    environment:
      - QT_QPA_PLATFORM=offscreen
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
      - MESA_LOADER_DRIVER_OVERRIDE=swrast
      - IGN_RENDERING_ENGINE=ogre
    command: >
      ros2 launch as2_gazebo_assets launch_simulation.py use_sim_time:=true simulation_config_file:=/workspace/config/world_gazebo.yaml headless:=true
  simulator:
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    environment:
      - QT_QPA_PLATFORM=offscreen
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
      - MESA_LOADER_DRIVER_OVERRIDE=swrast
      - IGN_RENDERING_ENGINE=ogre
      - EGL_PLATFORM=surfaceless
    command: >
      ros2 launch as2_platform_gazebo platform_gazebo_launch.py namespace:=drone_sim_0 platform_config_file:=/workspace/config/config_gazebo.yaml simulation_config_file:=/workspace/config/world_gazebo.yaml

  odom_bridge:
    network_mode: "host"
    image: cyberphysics/aerostack2
    depends_on:
      - simulator
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/scripts:/workspace/scripts:ro
    command: >
      python3 /workspace/scripts/pose_twist_to_odom.py

  stateestimator:
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    command: >
      ros2 launch as2_state_estimator state_estimator_launch.py namespace:=drone_sim_0 config_file:=/workspace/config/config_gazebo.yaml plugin_name:=ground_truth
  motioncontroller:
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    command: >
      ros2 launch as2_motion_controller controller_launch.py namespace:=drone_sim_0 config_file:=/workspace/config/config_gazebo.yaml plugin_name:=pid_speed_controller plugin_config_file:=/workspace/config/pid_speed_controller.yaml
  # Motion Behaviors
  motionbehaviors:
    profiles: ["behaviors"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    command: >
      ros2 launch as2_behaviors_motion motion_behaviors_launch.py namespace:=drone_sim_0 config_file:=/workspace/config/config_gazebo.yaml
  # Trajectory Generation Behavior
  trajectorygeneration:
    profiles: ["behaviors"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    command: >
      ros2 launch as2_behaviors_trajectory_generation generate_polynomial_trajectory_behavior_launch.py namespace:=drone_sim_0 config_file:=/workspace/config/config_gazebo.yaml
  # Point Gimbal Behavior
  gimbalbehavior:
    profiles: ["behaviors"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    command: >
      ros2 launch as2_behaviors_perception point_gimbal_behavior.launch.py namespace:=drone_sim_0 config_file:=/workspace/config/config_gazebo.yaml
  keyboardteleoperation:
    profiles: ["teleop"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    volumes:
      - /dev/shm:/dev/shm
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - ../systems/aerostack2_gazebo/config:/workspace/config:ro
    environment:
      - "DISPLAY=${DISPLAY}"
      - XAUTHORITY
      - NVIDIA_DRIVER_CAPABILITIES=all
      - EGL_PLATFORM=surfaceless
    command: >
      ros2 launch as2_keyboard_teleoperation as2_keyboard_teleoperation_launch.py namespace:=drone_sim_0
  # behaviortree:
  #   network_mode: "host"
  #   image: cyberphysics/aerostack2
  #   privileged: true
  #   devices:
  #     - /dev:/dev
  #   volumes:
  #     - /dev/shm:/dev/shm
  #     - ../systems/aerostack2_gazebo/config:/workspace/config:ro
  #   command: >
  #     ros2 launch as2_behavior_tree behavior_trees.launch.py drone_id:=drone_sim_0 tree:=./trees/square.xml

  aerodrone_sensor_sim:
    profiles: ["navsim"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    depends_on:
      simulator:
        condition: service_started
      odom_bridge:
        condition: service_started
      demnav_assets:
        condition: service_completed_successfully
      wildnav_assets:
        condition: service_completed_successfully
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/scripts:/workspace/scripts:ro
      - demnav_gazebo_cache:/data/demnav_cache:ro
      - wildnav_gazebo_cache:/data/wildnav_cache:ro
    command: >
      python3 /workspace/scripts/aerodrone_sensor_sim.py

  demnav_assets:
    profiles: ["navsim"]
    network_mode: host
    image: cyberphysics/demnav:${CYBERPHYSICS_TAG:-latest}
    container_name: demnav_gazebo_assets
    environment:
      - INITIAL_LAT=${INITIAL_LAT:-37.9234}
      - INITIAL_LON=${INITIAL_LON:--122.5967}
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - demnav_gazebo_cache:/data/demnav_cache
    command: >
      /venv/bin/python3 -m demnav_pkg.seed_cache
        --lat ${INITIAL_LAT:-37.9234}
        --lon ${INITIAL_LON:--122.5967}
        --area-km ${AREA_KM:-8.0}
        --resolution-m ${DEM_RESOLUTION_M:-10.0}
        --cache-dir /data/demnav_cache
    restart: "no"

  wildnav_assets:
    profiles: ["navsim"]
    network_mode: host
    image: cyberphysics/wildnav:${CYBERPHYSICS_TAG:-latest}
    container_name: wildnav_gazebo_assets
    environment:
      - INITIAL_LAT=${INITIAL_LAT:-37.9234}
      - INITIAL_LON=${INITIAL_LON:--122.5967}
      - WILDNAV_FEATURE_BACKEND=${WILDNAV_FEATURE_BACKEND:-SIFT}
      - WILDNAV_TILE_URL=${WILDNAV_TILE_URL:-https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}}
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - wildnav_gazebo_cache:/data/wildnav_cache
    command: >
      /venv/bin/python3 -m wildnav_pkg.seed_cache
        --lat ${INITIAL_LAT:-37.9234}
        --lon ${INITIAL_LON:--122.5967}
        --zoom ${WILDNAV_ZOOM:-18}
        --search-radius-m ${WILDNAV_SEARCH_RADIUS_M:-900.0}
        --max-tiles ${WILDNAV_MAX_TILES:-64}
        --feature-backend ${WILDNAV_FEATURE_BACKEND:-SIFT}
        --tile-url-template ${WILDNAV_TILE_URL:-https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}}
        --cache-dir /data/wildnav_cache
    restart: "no"

  demnav:
    profiles: ["navsim"]
    network_mode: "host"
    image: cyberphysics/demnav:${CYBERPHYSICS_TAG:-latest}
    container_name: demnav_sim
    depends_on:
      simulator:
        condition: service_started
      stateestimator:
        condition: service_started
      odom_bridge:
        condition: service_started
      aerodrone_sensor_sim:
        condition: service_started
      demnav_assets:
        condition: service_completed_successfully
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - INITIAL_LAT=${INITIAL_LAT:-37.9234}
      - INITIAL_LON=${INITIAL_LON:--122.5967}
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
      - demnav_gazebo_cache:/data/demnav_cache
    command: >
      stdbuf -o L
      ros2 launch demnav_pkg demnav.launch.py
        gps_topic:=${GPS_STANDARD_TOPIC:-/navigation/gps_standard}
        odom_topic:=${ODOM_TOPIC:-/drone_sim_0/sensor_measurements/odom}
        depth_topic:=${OAK_RELATIVE_DEPTH_TOPIC:-/oak1/relative_depth}
        camera_info_topic:=${OAK_DEPTH_INFO_TOPIC:-/oak1/camera_info}
        initial_lat:=${INITIAL_LAT:-37.9234}
        initial_lon:=${INITIAL_LON:--122.5967}
        origin_alt:=${ORIGIN_ALT:-850.0}
        area_km:=${AREA_KM:-8.0}
        search_radius_m:=${SEARCH_RADIUS_M:-900.0}
        dem_resolution_m:=${DEM_RESOLUTION_M:-10.0}
        fov_deg:=${FOV_DEG:-69.0}
        min_correlation:=${MIN_CORRELATION:-0.35}
        cache_dir:=/data/demnav_cache

  wildnav:
    profiles: ["navsim"]
    image: cyberphysics/wildnav:${CYBERPHYSICS_TAG:-latest}
    container_name: wildnav_sim
    network_mode: host
    ipc: host
    depends_on:
      simulator:
        condition: service_started
      stateestimator:
        condition: service_started
      odom_bridge:
        condition: service_started
      aerodrone_sensor_sim:
        condition: service_started
      demnav:
        condition: service_started
      wildnav_assets:
        condition: service_completed_successfully
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - WILDNAV_TILE_URL=${WILDNAV_TILE_URL:-https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}}
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
      - wildnav_gazebo_cache:/data/wildnav_cache
    command: >
      ros2 launch wildnav_pkg wildnav.launch.py
        image_topic:=${OAK_IMAGE_TOPIC:-/oak1/image_highres}
        camera_info_topic:=${OAK_IMAGE_INFO_TOPIC:-/oak1/image_highres/camera_info}
        prediction_odom_topic:=${NAVIGATION_ODOM_TOPIC:-/navigation/odometry}
        raw_odom_topic:=${RAW_ODOM_TOPIC:-/drone_sim_0/sensor_measurements/odom}
        gps_topic:=${GPS_STANDARD_TOPIC:-/navigation/gps_standard}
        demnav_odom_topic:=${DEMNAV_ODOM_TOPIC:-/demnav/odometry}
        navigation_output_topic:=${NAVIGATION_ODOM_TOPIC:-/navigation/odometry}
        initial_lat:=${INITIAL_LAT:-37.9234}
        initial_lon:=${INITIAL_LON:--122.5967}
        origin_alt:=${ORIGIN_ALT:-850.0}
        zoom:=${WILDNAV_ZOOM:-18}
        search_radius_m:=${WILDNAV_SEARCH_RADIUS_M:-900.0}
        max_tiles:=${WILDNAV_MAX_TILES:-64}
        max_tile_downloads_per_cycle:=${WILDNAV_MAX_DOWNLOADS:-8}
        match_rate_hz:=${WILDNAV_RATE_HZ:-0.2}
        feature_backend:=${WILDNAV_FEATURE_BACKEND:-SIFT}
        min_matches:=${WILDNAV_MIN_MATCHES:-16}
        min_inliers:=${WILDNAV_MIN_INLIERS:-10}
        min_inlier_ratio:=${WILDNAV_MIN_INLIER_RATIO:-0.25}
        max_position_jump_m:=${WILDNAV_MAX_JUMP_M:-250.0}
        minimum_demnav_confidence:=${DEMNAV_FUSION_CONFIDENCE:-0.35}
        minimum_wildnav_confidence:=${WILDNAV_FUSION_CONFIDENCE:-0.20}
        cache_dir:=/data/wildnav_cache

  aerodrone_nav_validator:
    profiles: ["validation"]
    network_mode: "host"
    image: cyberphysics/aerostack2
    depends_on:
      - demnav
      - wildnav
    env_file:
      - ../systems/aerostack2_gazebo/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_gazebo/scripts:/workspace/scripts:ro
    command: >
      python3 /workspace/scripts/validate_aerodrone_navsim.py
        --timeout-s ${AERODRONE_NAVSIM_VALIDATE_TIMEOUT:-180}
        --freshness-s ${AERODRONE_NAVSIM_FRESHNESS:-10}

volumes:
  demnav_gazebo_cache:
  wildnav_gazebo_cache:
