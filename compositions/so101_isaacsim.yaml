services:
  isaacsim:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    container_name: so101_isaacsim
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - ROS_DISTRO=jazzy
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ../applications/so101:/workspace/so101:ro
      - ~/docker/isaac-sim/cache/kit:/isaac-sim/kit/cache:rw
      - ~/docker/isaac-sim/cache/ov:/root/.cache/ov:rw
      - ~/docker/isaac-sim/cache/pip:/root/.cache/pip:rw
      - ~/docker/isaac-sim/cache/glcache:/root/.cache/nvidia/GLCache:rw
      - ~/docker/isaac-sim/cache/computecache:/root/.nv/ComputeCache:rw
    command: ./python.sh /workspace/so101/scripts/isaacsim_so101.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  controller:
    image: cyberphysics/so101
    container_name: so101_controller
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    depends_on:
      - isaacsim
    command: ros2 run so101_description so101_cbf_control.py
