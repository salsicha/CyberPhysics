# ArduPlane SITL navigation simulation with optional JSBSim support.

services:
  airplane_sitl:
    image: ardupilot/ardupilot-dev-base:${ARDUPILOT_TAG:-v0.2.0}
    container_name: airplane_sitl
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../systems/airplane/config/sitl.env
    volumes:
      - ../cache/ardupilot:/workspace/ardupilot
      - ../cache/jsbsim:/root/jsbsim
      - ../systems/airplane:/workspace/systems/airplane:ro
    working_dir: /workspace
    command:
      - bash
      - -lc
      - >
        set -e;
        ARDUPILOT_REF="$${ARDUPILOT_REF:-Plane-4.6.3}";
        if [ ! -d /workspace/ardupilot/.git ]; then
          git clone --recurse-submodules --depth=1 --branch "$$ARDUPILOT_REF" https://github.com/ArduPilot/ardupilot.git /workspace/ardupilot;
        else
          if ! git -C /workspace/ardupilot rev-parse --verify "refs/tags/$$ARDUPILOT_REF^{commit}" >/dev/null 2>&1; then
            git -C /workspace/ardupilot fetch --depth=1 origin "refs/tags/$$ARDUPILOT_REF:refs/tags/$$ARDUPILOT_REF";
          fi;
          if [ "$$(git -C /workspace/ardupilot rev-parse HEAD)" != "$$(git -C /workspace/ardupilot rev-parse "refs/tags/$$ARDUPILOT_REF^{commit}")" ]; then
            git -C /workspace/ardupilot checkout --detach "refs/tags/$$ARDUPILOT_REF";
            git -C /workspace/ardupilot submodule update --init --recursive --depth=1;
          fi;
        fi;
        cd /workspace/ardupilot;
        export PATH="$$PATH:/root/jsbsim/build/src";
        if [ "${AIRPLANE_SITL_MODEL:-plane}" = "jsbsim" ] && ! command -v JSBSim >/dev/null 2>&1; then
          if [ ! -d /root/jsbsim/.git ]; then
            git clone https://github.com/JSBSim-Team/jsbsim.git /root/jsbsim;
          fi;
          cmake -S /root/jsbsim -B /root/jsbsim/build -DCMAKE_BUILD_TYPE=Release;
          cmake --build /root/jsbsim/build -j2;
          export PATH="$$PATH:/root/jsbsim/build/src";
        fi;
        python3 Tools/autotest/sim_vehicle.py -v ArduPlane -f ${AIRPLANE_SITL_MODEL:-plane} --no-mavproxy --custom-location=${INITIAL_LAT:-37.9234},${INITIAL_LON:--122.5967},${ORIGIN_ALT:-280.0},0 --add-param-file=/workspace/systems/airplane/config/ardupilot_plane.params

  airplane_mavros:
    image: cyberphysics/aerostack2:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_sim_mavros
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - airplane_sitl
    env_file:
      - ../systems/airplane/config/sitl.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    command: >
      ros2 launch mavros apm.launch
        fcu_url:=${SITL_FCU_URL:-tcp://127.0.0.1:5760}

  airplane_bridge:
    image: cyberphysics/aerostack2:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_sim_bridge
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - airplane_mavros
    env_file:
      - ../systems/airplane/config/sitl.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/airplane:/workspace/systems/airplane:ro
      - /dev/shm:/dev/shm
    command: >
      python3 /workspace/systems/airplane/scripts/airplane_mavros_bridge.py
        --ros-args
        --params-file /workspace/systems/airplane/config/mavros_bridge.yaml

  airplane_satellite_camera:
    image: cyberphysics/aerostack2:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_satellite_camera
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - airplane_bridge
    env_file:
      - ../systems/airplane/config/sitl.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ../systems/airplane:/workspace/systems/airplane:ro
      - /dev/shm:/dev/shm
    command: >
      python3 /workspace/systems/airplane/scripts/satellite_camera_sim.py
        --ros-args
        --params-file /workspace/systems/airplane/config/satellite_camera_sim.yaml
        -p origin_lat:=${INITIAL_LAT:-37.9234}
        -p origin_lon:=${INITIAL_LON:--122.5967}
        -p altitude_agl_m:=${AIRPLANE_SIM_ALTITUDE_AGL_M:-180.0}
        -p groundspeed_mps:=${AIRPLANE_SIM_GROUNDSPEED_MPS:-24.0}

  airplane_demnav:
    image: cyberphysics/demnav:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_sim_demnav
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - airplane_bridge
      - airplane_satellite_camera
    env_file:
      - ../systems/airplane/config/sitl.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm
      - ../cache/airplane_demnav_cache:/data/demnav_cache
    command: >
      ros2 launch demnav_pkg demnav.launch.py
        gps_topic:=/${AIRPLANE_NAMESPACE:-plane0}/sensor_measurements/gps
        odom_topic:=/${AIRPLANE_NAMESPACE:-plane0}/sensor_measurements/odom
        depth_topic:=/airplane/downward/relative_depth
        camera_info_topic:=/airplane/downward/camera_info
        initial_lat:=${INITIAL_LAT:-37.9234}
        initial_lon:=${INITIAL_LON:--122.5967}
        origin_alt:=${ORIGIN_ALT:-280.0}
        area_km:=${AREA_KM:-12.0}
        search_radius_m:=${SEARCH_RADIUS_M:-1200.0}
        fov_deg:=${FOV_DEG:-69.0}
        dem_resolution_m:=${DEMNAV_RESOLUTION_M:-10.0}
        min_correlation:=${MIN_CORRELATION:-0.35}
        synthetic_terrain:=${DEMNAV_SYNTHETIC_TERRAIN:-true}

  airplane_wildnav:
    image: cyberphysics/wildnav:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_sim_wildnav
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      - airplane_bridge
      - airplane_satellite_camera
      - airplane_demnav
    env_file:
      - ../systems/airplane/config/sitl.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm
      - ../cache/airplane_wildnav_cache:/data/wildnav_cache
    command: >
      ros2 launch wildnav_pkg wildnav.launch.py
        image_topic:=/airplane/downward/image_highres
        camera_info_topic:=/airplane/downward/image_highres/camera_info
        prediction_odom_topic:=/airplane/navigation/odometry
        raw_odom_topic:=/${AIRPLANE_NAMESPACE:-plane0}/sensor_measurements/odom
        gps_topic:=/${AIRPLANE_NAMESPACE:-plane0}/sensor_measurements/gps
        demnav_odom_topic:=/demnav/odometry
        navigation_output_topic:=/airplane/navigation/odometry
        initial_lat:=${INITIAL_LAT:-37.9234}
        initial_lon:=${INITIAL_LON:--122.5967}
        origin_alt:=${ORIGIN_ALT:-280.0}
        zoom:=${WILDNAV_ZOOM:-17}
        search_radius_m:=${WILDNAV_SEARCH_RADIUS_M:-250.0}
        max_tiles:=${WILDNAV_MAX_TILES:-25}
        max_tile_downloads_per_cycle:=${WILDNAV_MAX_DOWNLOADS:-8}
        match_rate_hz:=${WILDNAV_RATE_HZ:-0.2}
        feature_backend:=${WILDNAV_FEATURE_BACKEND:-SIFT}
        min_matches:=${WILDNAV_MIN_MATCHES:-18}
        min_inliers:=${WILDNAV_MIN_INLIERS:-12}
        min_inlier_ratio:=${WILDNAV_MIN_INLIER_RATIO:-0.25}
        max_position_jump_m:=${WILDNAV_MAX_JUMP_M:-200.0}
        minimum_demnav_confidence:=${DEMNAV_FUSION_CONFIDENCE:-0.35}
        minimum_wildnav_confidence:=${WILDNAV_FUSION_CONFIDENCE:-0.10}

  airplane_rosbridge:
    image: cyberphysics/aerostack2:${CYBERPHYSICS_TAG:-latest}
    container_name: airplane_sim_rosbridge
    network_mode: host
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    command: ros2 launch rosbridge_server rosbridge_websocket_launch.xml
