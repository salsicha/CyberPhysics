services:
  gazebo:
    image: gazebo
    container_name: gazebo
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      - DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

  dronegui:
    image: dronegui
    container_name: dronegui
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      - DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix