services:
  genesis:
    network_mode: "host"
    image: cyberphysics/genesis:${CYBERPHYSICS_TAG:-latest}
    container_name: aerostack2_genesis
    ipc: host
    env_file:
      - ../systems/aerostack2_genesis/config/nav_topics.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - GENESIS_BACKEND=${GENESIS_BACKEND:-cpu}
      - PYOPENGL_PLATFORM=${PYOPENGL_PLATFORM:-egl}
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /dev/shm:/dev/shm
      - ../systems/aerostack2_genesis:/workspace/systems/aerostack2_genesis:ro
    command: >
      python3 /workspace/systems/aerostack2_genesis/scripts/genesis_aerostack2_navsim.py
        --backend ${GENESIS_BACKEND:-cpu}
        --lat ${INITIAL_LAT:-37.8044}
        --lon ${INITIAL_LON:--122.4661}
        --origin-alt ${ORIGIN_ALT:-0.0}
        --altitude-m ${GENESIS_FLIGHT_ALTITUDE_M:-300.0}
        --radius-m ${GENESIS_FLIGHT_RADIUS_M:-60.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  demnav:
    profiles: ["navsim"]
    network_mode: "host"
    image: cyberphysics/demnav:${CYBERPHYSICS_TAG:-latest}
    container_name: demnav_genesis
    depends_on:
      - genesis
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - INITIAL_LAT=${INITIAL_LAT:-37.8044}
      - INITIAL_LON=${INITIAL_LON:--122.4661}
    env_file:
      - ../systems/aerostack2_genesis/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
    command: >
      stdbuf -o L
      ros2 launch demnav_pkg demnav.launch.py
        gps_topic:=${GPS_TOPIC:-/drone_sim_0/sensor_measurements/gps}
        odom_topic:=${ODOM_TOPIC:-/drone_sim_0/sensor_measurements/odom}
        depth_topic:=${DEPTH_TOPIC:-/drone_sim_0/sensor_measurements/downward_rgbd/depth}
        camera_info_topic:=${CAMERA_INFO_TOPIC:-/drone_sim_0/sensor_measurements/downward_rgbd/depth/camera_info}
        initial_lat:=${INITIAL_LAT:-37.8044}
        initial_lon:=${INITIAL_LON:--122.4661}
        origin_alt:=${ORIGIN_ALT:-0.0}
        area_km:=${AREA_KM:-10.0}
        search_radius_m:=${SEARCH_RADIUS_M:-1000.0}
        dem_resolution_m:=${DEM_RESOLUTION_M:-30.0}
        fov_deg:=${FOV_DEG:-90.0}
        min_correlation:=${DEMNAV_MIN_CORRELATION:--1.0}
        min_dem_footprint_pixels:=${DEMNAV_MIN_FOOTPRINT_PIXELS:-3}

  wildnav:
    profiles: ["navsim"]
    image: cyberphysics/wildnav:${CYBERPHYSICS_TAG:-latest}
    container_name: wildnav_genesis
    network_mode: host
    ipc: host
    depends_on:
      - genesis
      - demnav
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    env_file:
      - ../systems/aerostack2_genesis/config/nav_topics.env
    volumes:
      - /dev/shm:/dev/shm
    command: >
      ros2 launch wildnav_pkg wildnav.launch.py
        image_topic:=${WILDNAV_IMAGE_TOPIC:-/drone_sim_0/sensor_measurements/downward_rgb/image_raw}
        camera_info_topic:=${WILDNAV_CAMERA_INFO_TOPIC:-/drone_sim_0/sensor_measurements/downward_rgb/camera_info}
        prediction_odom_topic:=${NAVIGATION_ODOM_TOPIC:-/navigation/odometry}
        raw_odom_topic:=${RAW_ODOM_TOPIC:-/drone_sim_0/sensor_measurements/odom}
        gps_topic:=${GPS_TOPIC:-/drone_sim_0/sensor_measurements/gps}
        demnav_odom_topic:=${DEMNAV_ODOM_TOPIC:-/demnav/odometry}
        navigation_output_topic:=${NAVIGATION_ODOM_TOPIC:-/navigation/odometry}
        initial_lat:=${INITIAL_LAT:-37.8044}
        initial_lon:=${INITIAL_LON:--122.4661}
        origin_alt:=${ORIGIN_ALT:-0.0}
        zoom:=${WILDNAV_ZOOM:-18}
        search_radius_m:=${WILDNAV_SEARCH_RADIUS_M:-250.0}
        max_tiles:=${WILDNAV_MAX_TILES:-49}
        max_tile_downloads_per_cycle:=${WILDNAV_MAX_DOWNLOADS:-8}
        match_rate_hz:=${WILDNAV_RATE_HZ:-0.2}
        min_matches:=${WILDNAV_MIN_MATCHES:-16}
        min_inliers:=${WILDNAV_MIN_INLIERS:-10}
        min_inlier_ratio:=${WILDNAV_MIN_INLIER_RATIO:-0.25}
