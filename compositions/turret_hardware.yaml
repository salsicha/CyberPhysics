# Physical PanTiltROS-compatible Arduino turret stack.
#
# The Arduino UNO R4 WiFi owns the electrical interface to the pan/tilt servos.
# This stack keeps the ROS side on the same /turret joint-command/state contract
# used by the simulator.

services:
  turret_pantiltros:
    image: cyberphysics/pantiltros:${CYBERPHYSICS_TAG:-latest}
    container_name: turret_pantiltros
    network_mode: host
    ipc: host
    privileged: true
    restart: unless-stopped
    env_file:
      - ../systems/turret/config/arduino.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    devices:
      - /dev:/dev
    volumes:
      - ../systems/turret/config:/workspace/config:ro
      - /dev/shm:/dev/shm
    command: >
      python3 /scripts/turret_arduino_bridge.py
        --ros-args
        --params-file /workspace/config/arduino_bridge.yaml

  turret_arduino:
    profiles:
      - arduino
    image: cyberphysics/arduino:${CYBERPHYSICS_TAG:-latest}
    container_name: turret_arduino
    network_mode: host
    privileged: true
    restart: "no"
    env_file:
      - ../systems/turret/config/arduino.env
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/tmp/.XAuthority
    devices:
      - /dev:/dev
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-/tmp/.Xauthority}:/tmp/.XAuthority:ro
      - /dev/shm:/dev/shm
    command: >
      /opt/arduino-ide/arduino-ide --no-sandbox
