services:
  so101_sim:
    image: cyberphysics/so101:${CYBERPHYSICS_TAG:-latest}
    container_name: so101_groot_mock_sim
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    command: >
      python3 /workspace/src/so101_description/scripts/mock_so101_sim.py

  groot_policy:
    image: cyberphysics/groot:${CYBERPHYSICS_TAG:-latest}
    container_name: so101_groot_policy
    network_mode: host
    ipc: host
    environment:
      - HF_HOME=/workspace/cache/huggingface
      - TORCH_HOME=/workspace/cache/torch
      - SO101_GROOT_MODE=${SO101_GROOT_MODE:-mock}
      - GR00T_MODEL_PATH=${GR00T_MODEL_PATH:-}
      - GR00T_EMBODIMENT_TAG=${GR00T_EMBODIMENT_TAG:-new_embodiment}
      - GR00T_DEVICE=${GR00T_DEVICE:-cuda}
    volumes:
      - ../data/groot:/workspace/data
      - ../cache/groot:/workspace/cache
    command: >
      python /workspace/so101_policy_server.py
        --mode ${SO101_GROOT_MODE:-mock}
        --port ${SO101_GROOT_PORT:-5555}

  so101_groot_bridge:
    image: cyberphysics/so101:${CYBERPHYSICS_TAG:-latest}
    container_name: so101_groot_bridge
    network_mode: host
    depends_on:
      - so101_sim
      - groot_policy
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - ../systems:/workspace/systems:ro
    command: >
      python3 /workspace/src/so101_description/scripts/groot_so101_bridge.py
        --ros-args
        --params-file /workspace/systems/so101/config/groot_demo.yaml
