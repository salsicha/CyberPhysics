# Physical RACECAR Neo stack.
#
# This stack replaces the simulator bridge with real sensor/actuator contracts.
# Hardware drivers outside this file should publish:
#   /scan
#   /imu/data_raw
#   wheel odometry or an odom source consumed by SLAM/Nav2
# A motor bridge should subscribe to:
#   /ackermann_cmd

services:
  racecarneo_camera:
    network_mode: host
    pull_policy: if_not_present
    privileged: true
    image: cyberphysics/realsense:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_camera
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/shm:/dev/shm
    command: >
      stdbuf -o L
      ros2 launch realsense2_camera rs_launch.py
        enable_color:=true
        enable_depth:=true
        align_depth.enable:=true
        pointcloud.enable:=false
        enable_gyro:=true
        enable_accel:=true
        unite_imu_method:=2

  racecarneo_cmd_vel_to_ackermann:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/racecarneo:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_cmd_vel_to_ackermann
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - ../systems/racecarneo/config:/workspace/config:ro
    command: >
      python3 /workspace/cmd_vel_to_ackermann.py
        --ros-args
        --params-file /workspace/config/cmd_vel_to_ackermann.yaml

  racecarneo_depthanything:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/depthanything:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_depthanything
    restart: unless-stopped
    depends_on:
      - racecarneo_camera
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: >
      ros2 launch depthanything_pkg depthanything.launch.py
        image_topic:=${RACECAR_COLOR_IMAGE_TOPIC:-/camera/color/image_raw}
        camera_info_topic:=${RACECAR_CAMERA_INFO_TOPIC:-/camera/color/camera_info}
        depth_topic:=/depth_anything/depth/image
        pointcloud_topic:=/depth_anything/points
        metric_dataset:=vkitti
        encoder:=vits
        max_depth:=80.0
        publish_pointcloud:=true
        pointcloud_stride:=4

  racecarneo_nvblox:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/nvblox:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_nvblox
    restart: unless-stopped
    depends_on:
      - racecarneo_camera
      - racecarneo_depthanything
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,video
    volumes:
      - ../systems/racecarneo/config:/workspace/config:ro
      - ../applications/nvblox/racecarneo_nvblox.launch.py:/workspace/racecarneo_nvblox.launch.py:ro
    command: >
      ros2 launch /workspace/racecarneo_nvblox.launch.py
        config_file:=/workspace/config/nvblox.yaml

  racecarneo_slam:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/racecarneo:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_slam
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - ../systems/racecarneo/config:/workspace/config:ro
    command: >
      ros2 launch slam_toolbox online_async_launch.py
        use_sim_time:=false
        slam_params_file:=/workspace/config/slam_toolbox.yaml

  racecarneo_nav2:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/racecarneo:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_nav2
    restart: unless-stopped
    depends_on:
      - racecarneo_slam
      - racecarneo_cmd_vel_to_ackermann
      - racecarneo_nvblox
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    volumes:
      - ../systems/racecarneo/config:/workspace/config:ro
    command: >
      ros2 launch nav2_bringup navigation_launch.py
        use_sim_time:=false
        params_file:=/workspace/config/nav2.yaml
        autostart:=true

  racecarneo_nicegui:
    network_mode: host
    pull_policy: if_not_present
    image: cyberphysics/nicegui:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_nicegui
    restart: unless-stopped
    depends_on:
      - racecarneo_nav2
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
    command: >
      python3 /workspace/scripts/main.py

  racecarneo_foxglove_bridge:
    network_mode: host
    image: cyberphysics/ros2:${CYBERPHYSICS_TAG:-latest}
    container_name: racecarneo_foxglove_bridge
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm
    command: >
      stdbuf -o L
      ros2 launch rosbridge_server rosbridge_websocket_launch.xml
