
# Pan Tilt ROS

services:
  pantiltros:
    network_mode: "host"
    image: cyberphysics/pantiltros
    container_name: pantiltros
    environment:
      - "DISPLAY=${DISPLAY}"
      - XAUTHORITY=/tmp/.XAuthority
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - /dev/shm:/dev/shm
      - ${XAUTHORITY:-/tmp/.Xauthority}:/tmp/.XAuthority:ro
    # command: >
    #   stdbuf -o L
      