
## Ollama:

## Settings -> model -> Install a model (i.e. llama3.2)

## http://localhost:3000/

services:
  openWebUI:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: missing
    restart: always
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-local:/app/backend/data

  ollama:
    image: ollama/ollama:latest
    pull_policy: missing
    ports:
      - "11434:11434"
    volumes:
      - ollama-local:/root/.ollama

    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [compute, utility]

volumes:
  ollama-local:
    external: false
  open-webui-local:
    external: false


