
services:
  airsim_client:
    network_mode: "host"
    image: cyberphysics/unrealengine
    volumes:
      - ../../applications/unrealengine/client:/scripts
      - "/tmp/.X11-unix:/tmp/.X11-unix"
    environment:
      - "DISPLAY=${DISPLAY}"
    command: >
      stdbuf -o L
      bash -c "cd /scripts/ && python3 example.py"
