lunar_waypoint_nav:
  ros__parameters:
    odom_topic: /lunar_rover/odom
    cmd_vel_topic: /lunar_rover/cmd_vel
    slope_topic: /lunar_rover/terrain/slope_deg
    slip_topic: /lunar_rover/terrain/slip_ratio
    illumination_topic: /lunar_rover/solar/illumination
    battery_topic: /lunar_rover/battery
    mission_status_topic: /lunar_rover/mission_status
    # Lunar south-pole prospecting traverse: leave a lander staging area,
    # cross loose regolith, approach a crater rim, sample two science points,
    # then return toward the staging corridor under power/thermal constraints.
    waypoints_xy: [
      0.0, -4.0,
      10.0, -5.0,
      22.0, -8.0,
      34.0, 3.0,
      44.0, 11.0,
      56.0, 22.0,
      66.0, 14.0,
      58.0, 2.0,
      38.0, -8.0,
      16.0, -6.0,
      0.0, -4.0
    ]
    loop: false
    acceptance_radius_m: 1.1
    desired_speed_mps: 0.28
    slow_radius_m: 5.5
    heading_gain: 1.1
    max_yaw_rate_rps: 0.34
    shadow_slowdown_factor: 0.45
    low_illumination_lux: 25000.0
    slip_slowdown_start: 0.18
    slip_stop_threshold: 0.52
    slope_slowdown_deg: 12.0
    battery_reserve_fraction: 0.12
